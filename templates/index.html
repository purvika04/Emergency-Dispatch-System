<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency Dispatch System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid justify-content-center">
        <h4 class="text-white">🚨 Emergency Dispatch System</h4>
    </div>
</nav>

<div class="container">
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card p-3 shadow-sm mb-3">
                <h5>Complete Mission</h5>
                <label class="small">Unit:</label>
                <select id="complete-unit" class="form-select mb-2">
                    <option value="1">Unit 1</option><option value="2">Unit 2</option>
                    <option value="3">Unit 3</option><option value="4">Unit 4</option>
                    <option value="5">Unit 5</option>
                </select>
                <button onclick="manualComplete()" class="btn btn-dark btn-sm">Complete</button>
            </div>
            <div class="mt-3 p-3 bg-white border rounded">
                <h5>Queue: <span id="queue-count" class="text-primary">0</span></h5>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4 shadow">
                <h4>Report Emergency</h4>
                <label class="form-label">Severity (1-5):</label>
                <input type="number" id="sev" class="form-control mb-2" value="3">
                <label class="form-label">Location (0-19):</label>
                <input type="number" id="loc" class="form-control mb-2" value="0">
                <label class="form-label">Type:</label>
                <select id="type" class="form-select mb-3">
                    <option>Ambulance (Medical)</option><option>Firetruck (Fire)</option>
                </select>
                <button onclick="submitEmergency()" class="btn btn-primary w-100">Submit</button>
            </div>
        </div>

        <div class="col-md-3 text-end">
            <button onclick="dispatchNext()" class="btn btn-dark w-100 mb-2">🚒 Dispatch</button>
            <button onclick="refreshStatus()" class="btn btn-outline-dark w-100 mb-2">🔙 Refresh Status</button>
            <button onclick="resetSystem()" class="btn btn-danger w-100">❌ Stop Simulation</button>
        </div>
    </div>

    <h4 class="mt-5 dark-title">🚛 Units Status</h4>
    <div id="units-container" class="row row-cols-1 row-cols-md-5 g-2"></div>
    <h4 class="mt-4 dark-title">🗺 Bangalore Live Dispatch Map</h4>
    <div id="map" style="height: 420px; border-radius: 12px;"></div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
